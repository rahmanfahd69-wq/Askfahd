const{useState,useEffect,useRef}=React;
const AL=["Sedentary (desk job)","Lightly active (1-2x/week)","Moderately active (3-4x/week)","Very active (5-6x/week)","Athlete (daily intense)"];
const GL=["Fat Loss","Muscle Gain","Strength","Endurance","Flexibility","General Fitness","Rehab / Recovery"];
const GA=["Full gym","Home gym (basic)","Bodyweight only","Resistance bands only","Mixed (gym + home)"];
const DT=["No restrictions","Vegetarian","Vegan","Keto / Low-carb","Halal","Gluten-free","Dairy-free"];
const SH=["< 5 hours","5-6 hours","6-7 hours","7-8 hours","8+ hours"];
const SL=["Low","Moderate","High","Very High"];
const WH=["< 6 hours","6-8 hours","8-10 hours","10-12 hours","12+ hours"];
const INJ=["None","Lower back","Shoulder","Knee","Wrist/Elbow","Neck","Hip","Ankle","Pec/Chest","Other"];

// Admin key: visit site with ?admin=yourkey once, it stores for the session
function getAdminKey(){
  try{
    const p=new URLSearchParams(window.location.search);
    const fromUrl=p.get('admin');
    if(fromUrl){
      sessionStorage.setItem('_fak',fromUrl);
      // Clean URL so key isn't visible in browser bar
      window.history.replaceState({},'',window.location.pathname);
      return fromUrl;
    }
    return sessionStorage.getItem('_fak')||"";
  }catch(e){return"";}
}

async function callClaude(sys,usr,mt=4000,model="claude-sonnet-4-20250514"){
  try{
    const body={model:model,max_tokens:mt,system:sys,messages:[{role:"user",content:usr}]};
    const ak=getAdminKey();if(ak)body.adminKey=ak;
    const r=await fetch("/api/ai",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    const d=await r.json();if(d.error){console.error("API error:",d.error);return null;}return d.content?.map(i=>i.text||"").join("\n")||null;
  }catch(e){console.error("API:",e);return null;}
}

async function callChat(sys,msgs,mt=1000){
  try{
    const am=msgs.map(m=>({role:m.sender==="user"?"user":"assistant",content:m.text}));
    const body={model:"claude-haiku-4-5-20251001",max_tokens:mt,system:sys,messages:am};
    const ak=getAdminKey();if(ak)body.adminKey=ak;
    const r=await fetch("/api/ai",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    const d=await r.json();
    if(r.status===429)return{limited:true,wait:d.wait||"a while",tier:d.tier||"unknown"};
    if(d.error){console.error("Chat error:",d.error);return{limited:false,text:"Sorry, something went wrong. Try again."};}
    return{limited:false,text:d.content?.map(i=>i.text||"").join("\n")||"Sorry, couldn't process that."};
  }catch(e){return{limited:false,text:"Connection issue — please try again."};}
}

async function generateAIPlan(profile,assessment){
  const{name,age,height,weight,gender}=profile;
  const bmi=(weight/((height/100)**2)).toFixed(1);
  const bmr=gender==="male"?Math.round(10*weight+6.25*height-5*age+5):Math.round(10*weight+6.25*height-5*age-161);

  // Sanitize inputs — remove special chars that might break JSON
  const goals=assessment.goals.map(g=>g.replace(/[\/]/g,'-')).join(", ");
  const injuries=assessment.injuries.map(i=>i.replace(/[\/]/g,'-')).join(", ");
  const diet=assessment.dietType.replace(/[\/]/g,'-');

  const prompt=`Create a fitness plan as JSON for this person.

USER: ${name}, ${age}yo ${gender}, ${height}cm, ${weight}kg, BMI ${bmi}, BMR ${bmr}
Activity: ${assessment.activityLevel}
Goals: ${goals}
Gym: ${assessment.gymAccess}
Diet: ${diet}
Sleep: ${assessment.sleepHours}
Stress: ${assessment.stressLevel}
Work hours: ${assessment.workHours}
Injuries: ${injuries}

RULES:
- Sleep under 6h: reduce volume, add recovery
- High stress: include deload advice
- Injuries: avoid loading injured areas
- Work 10+h: sessions under 50min
- Bodyweight only: only bodyweight exercises
- Respect diet type strictly
- Fat loss: caloric deficit. Muscle gain: surplus

Return ONLY this JSON structure, nothing else:
{"tdee":0,"calorieTarget":0,"protein":0,"carbs":0,"fats":0,"sleepRec":"","trainingDays":0,"split":"","restDays":"","planNotes":[""],"weeklyPlan":[{"day":"Monday","label":"","exercises":[{"name":"","sets":"","reps":"","rest":""}]},{"day":"Tuesday","label":"","exercises":[]},{"day":"Wednesday","label":"","exercises":[]},{"day":"Thursday","label":"","exercises":[]},{"day":"Friday","label":"","exercises":[]},{"day":"Saturday","label":"","exercises":[]},{"day":"Sunday","label":"","exercises":[]}],"meals":{"overview":"","proteinSources":"","carbSources":"","fatSources":"","schedule":[{"time":"","name":"","example":""}]},"recovery":[""],"timeAdvice":[""]}

Fill all 7 days. 4-6 exercises on training days. Empty exercises array on rest days. 5-6 meals. 4-6 recovery tips. 4-6 time tips. Keep all string values short. No special characters in values. No markdown.`;

  // Try up to 2 times
  for(let attempt=0;attempt<2;attempt++){
    const result=await callClaude("Output ONLY valid JSON. No markdown. No backticks. No explanation text before or after. Just the JSON object.",prompt,3500,"claude-haiku-4-5-20251001");
    if(!result)continue;
    try{
      let cleaned=result;
      // Extract JSON between first { and last }
      const start=cleaned.indexOf('{');
      const end=cleaned.lastIndexOf('}');
      if(start!==-1&&end!==-1&&end>start){
        cleaned=cleaned.substring(start,end+1);
      }
      // Fix common JSON issues
      cleaned=cleaned.replace(/,\s*}/g,'}').replace(/,\s*]/g,']');
      // Remove any control characters
      cleaned=cleaned.replace(/[\x00-\x1F\x7F]/g,' ').replace(/\n/g,' ').replace(/\r/g,' ').replace(/\t/g,' ');
      
      const p=JSON.parse(cleaned);
      
      // Validate essential fields exist
      if(!p.tdee||!p.weeklyPlan||!p.meals){
        console.error("Missing fields in plan, retrying...");
        continue;
      }
      
      p.name=name;p.age=age;p.gender=gender;p.height=height;p.weight=weight;p.bmi=bmi;p.bmr=bmr;
      p.hasInjury=assessment.injuries.length>0&&!assessment.injuries.includes("None");
      p.injuries=assessment.injuries;
      return p;
    }catch(e){
      console.error("Parse attempt "+(attempt+1)+":",e.message);
      continue;
    }
  }
  return null;
}

function buildChatSys(plan){
  return `You are Ask Fahd — the AI fitness coach inside FARfit. Built by Fahd, a natural athlete and coach in Dubai.

Style: direct, no-fluff, practical. Talk like a real coach. Keep responses concise (under 150 words unless detailed plan requested). Use bullet points with - for lists. Use **bold** only for key terms. Never use headings with # or ##. Keep formatting minimal and clean.

Cover: training, nutrition, recovery, sleep, stress, injury prevention, mobility, running, functional fitness, time management.

${plan?`USER'S PLAN DATA — personalise EVERY response to these:
Name: ${plan.name}, Age: ${plan.age}, BMI: ${plan.bmi}
TDEE: ${plan.tdee}, Target: ${plan.calorieTarget} kcal
Macros: ${plan.protein}g P / ${plan.carbs}g C / ${plan.fats}g F
Split: ${plan.split} (${plan.trainingDays}x/week)
Sleep: ${plan.sleepRec}

Relate answers to THEIR numbers, THEIR split, THEIR injuries. Not generic.
If they share new info (e.g. "slept 3 hours"), adjust advice for TODAY accordingly.`:'User has not done assessment. Answer general questions but suggest the free assessment.'}

function genPlanText(p){
  let t=`FARfit — PLAN FOR ${p.name.toUpperCase()}\n${"═".repeat(50)}\n\n`;
  t+=`Age: ${p.age} | ${p.height}cm | ${p.weight}kg | BMI: ${p.bmi}\n`;
  t+=`BMR: ${p.bmr} | TDEE: ${p.tdee} | Target: ${p.calorieTarget} kcal\n`;
  t+=`P: ${p.protein}g | C: ${p.carbs}g | F: ${p.fats}g\n`;
  t+=`Split: ${p.split} (${p.trainingDays}x/wk) | Rest: ${p.restDays}\nSleep: ${p.sleepRec}\n\n`;
  if(p.planNotes?.length){p.planNotes.forEach(n=>{t+=`• ${n}\n`;});t+="\n";}
  t+=`WORKOUT\n${"─".repeat(40)}\n`;
  (p.weeklyPlan||[]).forEach(d=>{t+=`\n${d.day} — ${d.label}\n`;if(!d.exercises?.length)t+="  Rest / active recovery\n";else d.exercises.forEach(e=>{t+=`  ${e.name.padEnd(32)} ${String(e.sets).padEnd(7)} ${String(e.reps).padEnd(10)} ${e.rest}\n`;});});
  t+=`\n\nNUTRITION\n${"─".repeat(40)}\n${p.meals?.overview}\n\n`;
  (p.meals?.schedule||[]).forEach(m=>{t+=`${m.time}  ${m.name}: ${m.example}\n`;});
  t+=`\nProtein: ${p.meals?.proteinSources}\nCarbs: ${p.meals?.carbSources}\nFats: ${p.meals?.fatSources}`;
  t+=`\n\nRECOVERY\n${"─".repeat(40)}\n`;(p.recovery||[]).forEach((r,i)=>{t+=`${i+1}. ${r}\n`;});
  t+=`\nSCHEDULE\n${"─".repeat(40)}\n`;(p.timeAdvice||[]).forEach(a=>{t+=`→ ${a}\n`;});
  t+=`\n\n${"═".repeat(50)}\nFARfit — askfahd.vercel.app\nBuilt by Fahd Rahman\n`;
  return t;
}

function dlPlan(p){const b=new Blob([genPlanText(p)],{type:'text/plain'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=`FARfit_${p.name.replace(/\s+/g,'_')}.txt`;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);}

function About({onBack,onStart,onChat}){
  return(<Shell><Logo onClick={onBack}/><STitle t="ABOUT FAHD" s="The person behind FARfit"/>
    <div style={{fontSize:"15px",lineHeight:1.85,color:"var(--text-secondary)",marginBottom:"32px"}}>

      <p style={{marginBottom:"16px"}}>My approach is practical, not perfect. Functional strength, mobility, bodyweight mastery, smart nutrition, and recovery protocols that actually fit into a demanding schedule. No bro-science. No cookie-cutter plans. Every recommendation is built around your real life — your sleep, your stress, your injuries, your diet, your time.</p>

      <p>The assessment and plan are free. If you want deeper coaching — weekly check-ins, plan adjustments, direct access — that option exists too.</p>
    </div>
    <div style={{display:"flex",gap:"10px",flexWrap:"wrap"}}>

// ── Markdown renderer ──
function RenderMd({text}){
  if(!text)return null;
  const parts=text.split('\n').filter(l=>l!==undefined);
  const elements=[];
  parts.forEach((line,i)=>{
    // Process inline markdown
    let processed=line;
    // Bold **text** or __text__
    const boldParts=[];
    let remaining=processed;
    while(remaining.length>0){
      const boldMatch=remaining.match(/\*\*(.+?)\*\*|__(.+?)__/);
      if(boldMatch){
        const idx=remaining.indexOf(boldMatch[0]);
        if(idx>0)boldParts.push(remaining.substring(0,idx));
        boldParts.push(React.createElement('strong',{key:`b${i}-${boldParts.length}`,style:{color:"var(--fire-light)",fontWeight:600}},boldMatch[1]||boldMatch[2]));
        remaining=remaining.substring(idx+boldMatch[0].length);
      }else{
        boldParts.push(remaining);
        remaining="";
      }
    }
    // Bullet points
    const trimmed=line.trim();
    if(trimmed.startsWith('- ')||trimmed.startsWith('* ')||trimmed.match(/^\d+\.\s/)){
      const bulletText=trimmed.replace(/^[-*]\s/,'').replace(/^\d+\.\s/,'');
      // Re-process bold in bullet
      const bParts=[];
      let rem=bulletText;
      while(rem.length>0){
        const bm=rem.match(/\*\*(.+?)\*\*/);
        if(bm){const idx=rem.indexOf(bm[0]);if(idx>0)bParts.push(rem.substring(0,idx));bParts.push(React.createElement('strong',{key:`bb${i}-${bParts.length}`,style:{color:"var(--fire-light)",fontWeight:600}},bm[1]));rem=rem.substring(idx+bm[0].length);}
        else{bParts.push(rem);rem="";}
      }
      elements.push(React.createElement('div',{key:i,style:{display:"flex",gap:"8px",marginBottom:"4px",paddingLeft:"4px"}},
        React.createElement('span',{style:{color:"var(--fire)",flexShrink:0}},"•"),
        React.createElement('span',null,...bParts)
      ));
    }else if(trimmed===""){
      elements.push(React.createElement('div',{key:i,style:{height:"8px"}}));
    }else{
      elements.push(React.createElement('div',{key:i,style:{marginBottom:"4px"}},...boldParts));
    }
  });
  return React.createElement('div',null,...elements);
}

// ── App ──
function App(){

  const[plan,setPlan]=useState(null);

  const onOnboard=(d)=>{setProfile(d);setPhase("assessment");};

    setAssessment(d);setPhase("generating");
    const p=await generateAIPlan(profile,d);
    if(p){setPlan(p);setPhase("plan");}else{setPhase("error");}
  };
  const onRetry=async()=>{
    if(!profile||!assessment){setPhase("onboarding");return;}
    setPhase("generating");
    const p=await generateAIPlan(profile,assessment);
    if(p){setPlan(p);setPhase("plan");}else{setPhase("error");}
  };
  const goHome=()=>setPhase("landing");

  return(<div>
    {phase==="landing"&&<Landing onStart={()=>setPhase("onboarding")} onAbout={()=>setPhase("about")} onChat={()=>setPhase("chat")}/>}
    {phase==="about"&&<About onBack={goHome} onStart={()=>setPhase("onboarding")} onChat={()=>setPhase("chat")}/>}
    {phase==="chat"&&<ChatPage onBack={goHome} plan={plan}/>}
    {phase==="onboarding"&&<Onboard onDone={onOnboard} onBack={goHome}/>}
    {phase==="assessment"&&<Assess onDone={onAssess} onBack={()=>setPhase("onboarding")}/>}
    {phase==="generating"&&<Generating/>}
    {phase==="error"&&<Err onRetry={onRetry}/>}
    {phase==="plan"&&plan&&<Plan plan={plan} onBack={goHome} onRetake={()=>{setPlan(null);setProfile(null);setAssessment(null);setPhase("onboarding");}}/>}
  </div>);
}
